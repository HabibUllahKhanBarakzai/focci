# GoReleaser config — builds macOS binaries and cuts a GitHub Release.
# Triggered by pushing a v* tag (see .github/workflows/release.yml).
# Validate locally: goreleaser check  /  goreleaser release --snapshot --clean
version: 2

project_name: focci

before:
  hooks:
    - go mod tidy

builds:
  - id: focci
    main: .
    binary: focci
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    # Stamp the release version into the binary (matches the Makefile / cmd.version).
    ldflags:
      - -s -w -X github.com/HabibUllahKhanBarakzai/focci/cmd.version={{ .Version }}

archives:
  - id: focci
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: HabibUllahKhanBarakzai
    name: focci
