name: Release

# Cut a release by pushing a version tag:
#   git tag v0.3.0 && git push origin v0.3.0
# This builds the macOS binaries, publishes a GitHub Release, and updates the
# Homebrew tap (HabibUllahKhanBarakzai/homebrew-focci) to install those binaries.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: goreleaser
    # Pure-Go (CGO disabled) cross-compiles to darwin from Linux, so no macOS runner needed.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          check-latest: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          # GITHUB_TOKEN publishes the release in this repo.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # HOMEBREW_TAP_TOKEN pushes the updated formula to the separate tap repo.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
