name: Release

# Cut a release by pushing a version tag:
#   git tag v0.3.0 && git push origin v0.3.0
# This builds the macOS binaries, publishes a GitHub Release, and updates the
# Homebrew tap (HabibUllahKhanBarakzai/homebrew-focci) to install those binaries.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: goreleaser
    # Pure-Go (CGO disabled) cross-compiles to darwin from Linux, so no macOS runner needed.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          check-latest: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          # GITHUB_TOKEN publishes the release in this repo.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check out Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: HabibUllahKhanBarakzai/homebrew-focci
          path: homebrew-focci
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Publish Homebrew formula
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          version="${RELEASE_TAG#v}"
          archive_prefix="focci_${version}_darwin"
          arm64_archive="${archive_prefix}_arm64.tar.gz"
          amd64_archive="${archive_prefix}_amd64.tar.gz"

          arm64_sha="$(awk -v archive="$arm64_archive" '$2 == archive { print $1 }' dist/checksums.txt)"
          amd64_sha="$(awk -v archive="$amd64_archive" '$2 == archive { print $1 }' dist/checksums.txt)"

          if [ -z "$arm64_sha" ] || [ -z "$amd64_sha" ]; then
            echo "Missing Homebrew archive checksum in dist/checksums.txt"
            exit 1
          fi

          mkdir -p homebrew-focci/Formula
          rm -f homebrew-focci/Casks/focci.rb

          cat > homebrew-focci/Formula/focci.rb <<EOF
          # This file was generated by the focci release workflow. DO NOT EDIT.
          class Focci < Formula
            desc "Refocus your terminal/editor when an AI coding agent needs your attention"
            homepage "https://github.com/HabibUllahKhanBarakzai/focci"
            license "Apache-2.0"
            version "$version"

            on_macos do
              on_arm do
                url "https://github.com/HabibUllahKhanBarakzai/focci/releases/download/v#{version}/focci_#{version}_darwin_arm64.tar.gz"
                sha256 "$arm64_sha"
              end

              on_intel do
                url "https://github.com/HabibUllahKhanBarakzai/focci/releases/download/v#{version}/focci_#{version}_darwin_amd64.tar.gz"
                sha256 "$amd64_sha"
              end
            end

            depends_on macos: :big_sur

            def install
              bin.install "focci"
            end

            test do
              assert_match "focci #{version}", shell_output("#{bin}/focci --version")
            end
          end
          EOF

          cd homebrew-focci
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet --exit-code; then
            echo "Homebrew tap already up to date."
            exit 0
          fi

          git add -A
          git commit -m "Update focci to v${version}"
          git push origin HEAD:main
